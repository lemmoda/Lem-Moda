    <script>
        const firebaseConfig = { 
            databaseURL: "https://lem-moda-loyalty-default-rtdb.firebaseio.com/",
            appId: "1:901791881107:web:e1ff85e3fc768064eeba66"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let nombreClienteActivo = "Cliente VIP";

        // Enter key en cualquier campo del login dispara accessSystem
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const authPanel = document.getElementById('authPanel');
                if (authPanel && authPanel.style.display !== 'none') {
                    accessSystem();
                }
            }
        });

        function toggleModal(show) {
            document.getElementById('modalBeneficios').style.display = show ? 'flex' : 'none';
        }

        function accessSystem() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const pin = document.getElementById('userPin').value.trim();
            if(!phone || !pin) return;
            
            const userRef = db.ref('lem_users/' + phone);
            const timestampActual = new Date().toISOString();

            userRef.once('value', (snap) => {
                const data = snap.val();
                if(!data) {
                    // SI ES NUEVO: Obligatorio rellenar el campo nombre
                    if(!name) {
                        alert("¡Bienvenido a LEM MODA! Al ser tu primera vez ingresando, por favor escribe tu Nombre Completo para registrarte.");
                        return;
                    }
                    nombreClienteActivo = name;
                    userRef.set({
                        nombre: name,
                        pin: pin, 
                        puntos: 0, 
                        fecha_registro: timestampActual, 
                        ultima_actividad: timestampActual
                    }).then(() => login(phone));
                } else if(data.pin === pin) {
                    // SI YA EXISTÍA: Lógica inteligente para usuarios antiguos sin nombre
                    if(!data.nombre) {
                        if(!name) {
                            alert("Para actualizar tu perfil de fidelidad, por favor escribe tu Nombre Completo en el primer recuadro.");
                            return;
                        }
                        nombreClienteActivo = name;
                        userRef.update({
                            nombre: name,
                            ultima_actividad: timestampActual
                        }).then(() => login(phone));
                    } else {
                        nombreClienteActivo = data.nombre;
                        userRef.update({ultima_actividad: timestampActual}).then(() => login(phone));
                    }
                } else {
                    alert("PIN incorrecto");
                }
            });
        }

        function login(phone) {
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('cardPanel').style.display = 'block';
            QRCode.toCanvas(document.getElementById('qr-canvas'), phone, { width: 120, margin: 1 });
            db.ref('lem_users/' + phone + '/puntos').on('value', (snap) => {
                const p = snap.val() || 0;
                document.getElementById('counterLabel').innerText = `${p} DE 8 SELLOS`;
                const grid = document.getElementById('stampGrid');
                grid.innerHTML = '';
                
                for(let i=0; i<8; i++) {
                    const s = document.createElement('div');
                    const isActive = i < p;
                    const index = i + 1;
     
                    s.className = 'slot' + (isActive ? ' active' : '');
                    s.setAttribute('data-index', index);

                    if(index === 4) s.classList.add('silver-frame');
                    if(index === 8) s.classList.add('gold-frame');

                    if(isActive) {
                        s.innerHTML = '<img src="2.png.png">';
                    } else {
                        if(index === 4) s.innerHTML = '<span class="premio-text silver">50% OFF<br>PRENDA</span>';
                        else if (index === 8) s.innerHTML = '<span class="premio-text gold">PRENDA<br>REGALO</span>';
                        else s.innerHTML = '';
                    }
                    grid.appendChild(s);
                }
                checkMilestones(p, phone);
            });
        }

        function checkMilestones(p, phone) {
            const overlay = document.getElementById('success-overlay');
            const title = document.getElementById('successTitle');
            const msg = document.getElementById('successMsg');
            const waAction = document.getElementById('waAction');
            const notifBox = document.getElementById('premioNotif');
            
            if (p === 4) {
                lanzarConfeti();
                overlay.style.display = 'flex';
                title.innerText = "¡Recompensa Alcanzada!";
                msg.innerText = `¡Felicidades ${nombreClienteActivo}! Por tus 4 estampas tienes el 50% de descuento en una prenda.`;
                waAction.innerHTML = `<button class="btn-main" style="background:#25d366; color:white;" onclick="enviarWA('${phone}', 4)">Reclamar por WhatsApp</button>`;
                notifBox.style.display = 'block';
                notifBox.innerHTML = `<small style="color:var(--lem-verde)">✓ Tienes un 50% OFF disponible</small>`;
            } else if (p >= 8) {
                lanzarConfeti();
                overlay.style.display = 'flex';
                title.innerText = "¡Nivel Completado!";
                msg.innerText = `¡Increíble ${nombreClienteActivo}! Has completado las 8 estampas. ¡Tu prenda de regalo te espera!`;
                waAction.innerHTML = `<button class="btn-main" style="background:#25d366; color:white;" onclick="enviarWA('${phone}', 8)">Reclamar Regalo</button>`;
                notifBox.style.display = 'block';
                notifBox.innerHTML = `<small style="color:var(--lem-verde)">✓ ¡Prenda de regalo lista!</small>`;
            } else {
                notifBox.style.display = 'none';
            }
        }

        function lanzarConfeti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d4a373', '#1a2e4a', '#c9a84c', '#ffffff'] });
        }

        function enviarWA(phone, hito) {
            const waNumber = "593984909967";
            let texto = "";
            
            if (hito === 4) {
                texto = `👔 *¡BENEFICIO DÍA DEL PADRE - LEM MODA!* 👔\n\n` +
                        `Hola, equipo de LEM. 👋\n\n` +
                        `¡Ya completé mis primeras *4 ESTAMPAS* 🎫 y quiero solicitar mi beneficio especial del Día del Padre:\n` +
                        `🎁 *50% DE DESCUENTO* en mi prenda.\n\n` +
                        `📌 *Cliente:* ${nombreClienteActivo}\n` +
                        `📌 *WhatsApp registrado:* ${phone}\n\n` +
                        `¿Me ayudan para hacerlo efectivo en mi compra? ¡Muchas gracias! 🥂`;
            } else {
                texto = `👨‍👦 *¡TARJETA COMPLETA - EDICIÓN PAPÁ LEM MODA!* 👨‍👦\n\n` +
                        `¡Hola! 👋 ¡Lo logré!\n\n` +
                        `He completado mis *8 ESTAMPAS* 🏆 en la edición Día del Padre.\n` +
                        `🛍️ ¡Vengo por mi *PRENDA DE REGALO*!\n\n` +
                        `📌 *Cliente:* ${nombreClienteActivo}\n` +
                        `📌 *WhatsApp registrado:* ${phone}\n\n` +
                        `Estoy muy emocionado/a por elegir mi regalo. ¡Gracias! ✨`;
            }
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <script>
        (function() {
            const canvas = document.getElementById('padreCanvas');
            const ctx = canvas.getContext('2d');

            const words = [
                'Papá',       'Dad',          'Père',        'Padre',
                'Vater',      'Pai',          'Baba',        'Otosan',
                'Appa',       'Tata',         'Táta',        'Bapa',
                'Babbo',      'Pappa',        'Tatay',       'Bapak',
                'Papà',       'Päpa',         'Dada',
                'Sabio',      'Fuerte',       'Mi Héroe',    'Valiente',
                'Confiable',  'Brillante',    'Maestro',     'Amado',
                'Talentoso',  'Comprensivo',  'Inteligente', 'Alegre',
                'Divertido',  'Trabajador',   'Único',       'El Rey',
                'Mi Apoyo',   'Invencible',   'Coach',       'Chef',
                'Inspiración','Simpático',    'Jefe',        'Cool',
                'Mi mejor amigo', 'Apasionado', 'Perseverante'
            ];

            const DAD_WORDS = new Set([
                'Papá','Dad','Père','Padre','Vater','Pai','Baba','Otosan',
                'Appa','Tata','Táta','Bapa','Babbo','Pappa','Tatay','Bapak',
                'Papà','Päpa','Dada'
            ]);

            const FILLS   = ['#c9a84c', '#f0d080', '#ffffff', '#b8d8f0', '#e8c87a'];
            const STROKES = ['#0a1628', '#0a1628', '#0a1628', '#0a1628', '#0a1628'];

            const QUALITY_FILLS   = ['#c9a84c', '#f0d080', '#ffb347', '#ffd700'];
            const QUALITY_STROKES = ['#0a1628', '#0a1628', '#0a1628', '#0a1628'];

            let particles = [];
            let W, H;
            let fontReady = false;

            document.fonts.load('900 20px "Fredoka One"').then(() => { fontReady = true; });

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            function createParticle() {
                const side = Math.floor(Math.random() * 4);
                let x, y, vx, vy;
                const speed = 0.22 + Math.random() * 0.35;
                if (side === 0)      { x = Math.random() * W; y = -30;    vx = (Math.random()-0.5)*0.3; vy = speed; }
                else if (side === 1) { x = W+30;  y = Math.random()*H;    vx = -speed; vy = (Math.random()-0.5)*0.3; }
                else if (side === 2) { x = Math.random()*W;  y = H+30;    vx = (Math.random()-0.5)*0.3; vy = -speed; }
                else                 { x = -30;   y = Math.random()*H;    vx = speed;  vy = (Math.random()-0.5)*0.3; }

                const text = rand(words);
                const isQuality = !DAD_WORDS.has(text);
                const fills  = isQuality ? QUALITY_FILLS  : FILLS;
                const strks  = isQuality ? QUALITY_STROKES : STROKES;
                const ci = Math.floor(Math.random() * fills.length);

                return {
                    x, y, vx, vy,
                    text,
                    fill: fills[ci],
                    stroke: strks[ci],
                    size: isQuality
                        ? 14 + Math.floor(Math.random() * 10)
                        : 18 + Math.floor(Math.random() * 14),
                    alpha: 0,
                    life: 0,
                    maxLife: isQuality
                        ? 220 + Math.floor(Math.random() * 140)
                        : 300 + Math.floor(Math.random() * 200),
                    angle: (Math.random() - 0.5) * 0.25
                };
            }

            function isOff(p) {
                return p.x < -200 || p.x > W+200 || p.y < -60 || p.y > H+60;
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);

                if (fontReady && particles.length < 12 && Math.random() < 0.045) {
                    particles.push(createParticle());
                }

                particles = particles.filter(p => {
                    p.life++;
                    p.x += p.vx;
                    p.y += p.vy;

                    const fz = 50;
                    if (p.life < fz) {
                        p.alpha = p.life / fz;
                    } else if (p.life > p.maxLife - fz) {
                        p.alpha = Math.max(0, (p.maxLife - p.life) / fz);
                    } else {
                        p.alpha = 1;
                    }

                    if (p.life >= p.maxLife || isOff(p)) return false;

                    ctx.save();
                    ctx.globalAlpha = p.alpha * 0.92;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.font = `900 ${p.size}px "Fredoka One", cursive`;
                    ctx.textBaseline = 'middle';

                    ctx.strokeStyle = p.stroke;
                    ctx.lineWidth = p.size * 0.22;
                    ctx.lineJoin = 'round';
                    ctx.strokeText(p.text, 0, 0);

                    ctx.fillStyle = p.fill;
                    ctx.fillText(p.text, 0, 0);

                    ctx.restore();
                    return true;
                });

                requestAnimationFrame(animate);
            }

            resize();
            window.addEventListener('resize', resize);

            setTimeout(() => {
                for (let i = 0; i < 6; i++) {
                    const p = createParticle();
                    p.x = 30 + Math.random() * (W - 60);
                    p.y = 30 + Math.random() * (H - 60);
                    p.life = Math.floor(Math.random() * 120);
                    particles.push(p);
                }
                animate();
            }, 400);
        })();
    </script>

    <script>
    (function() {
        const cv = document.getElementById('mundialCanvas');
        const cx = cv.getContext('2d');
        let W, H, t = 0;

        // Stars
        const STARS = Array.from({length: 55}, () => ({
            x: Math.random(), y: Math.random(),
            r: 0.5 + Math.random() * 1.5,
            phase: Math.random() * Math.PI * 2,
            speed: 0.01 + Math.random() * 0.025
        }));

        function resize() {
            W = cv.width  = window.innerWidth;
            H = cv.height = window.innerHeight;
        }

        // Trophy — subtle center glow
        function drawTrophy(t) {
            const pulse = 1 + Math.sin(t * 1.2) * 0.03;
            const s = Math.min(W * 0.06, 48) * pulse;
            const tx = W * 0.5, ty = H * 0.5;
            cx.save();
            cx.translate(tx, ty);
            cx.globalAlpha = 0.2 + Math.sin(t * 0.8) * 0.04;

            const grd = cx.createRadialGradient(0,0,s*0.05,0,0,s*1.2);
            grd.addColorStop(0,'rgba(255,209,0,0.45)');
            grd.addColorStop(1,'rgba(255,209,0,0)');
            cx.fillStyle = grd;
            cx.beginPath(); cx.arc(0,0,s*1.2,0,Math.PI*2); cx.fill();

            cx.strokeStyle='#FFD100'; cx.lineWidth=s*0.07;
            cx.lineJoin='round'; cx.lineCap='round';

            cx.beginPath();
            cx.moveTo(-s*.38,-s*.5); cx.lineTo(-s*.42,-s*.1);
            cx.quadraticCurveTo(-s*.42,s*.22,0,s*.28);
            cx.quadraticCurveTo(s*.42,s*.22,s*.42,-s*.1);
            cx.lineTo(s*.38,-s*.5); cx.closePath();
            cx.fillStyle='#c9a84c'; cx.fill(); cx.stroke();

            cx.beginPath(); cx.moveTo(-s*.38,-s*.28);
            cx.quadraticCurveTo(-s*.65,-s*.1,-s*.38,s*.08); cx.stroke();
            cx.beginPath(); cx.moveTo(s*.38,-s*.28);
            cx.quadraticCurveTo(s*.65,-s*.1,s*.38,s*.08); cx.stroke();

            cx.beginPath();
            cx.moveTo(-s*.12,s*.28); cx.lineTo(-s*.12,s*.44);
            cx.moveTo(s*.12,s*.28);  cx.lineTo(s*.12,s*.44); cx.stroke();
            cx.lineWidth=s*.1;
            cx.beginPath(); cx.moveTo(-s*.32,s*.44); cx.lineTo(s*.32,s*.44); cx.stroke();
            cx.restore();
        }

        function draw() {
            cx.clearRect(0, 0, W, H);
            t += 0.016;

            // twinkling stars
            for (const s of STARS) {
                s.phase += s.speed;
                cx.globalAlpha = 0.08 + Math.abs(Math.sin(s.phase)) * 0.12;
                cx.fillStyle = '#FFD100';
                cx.beginPath(); cx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); cx.fill();
            }

            // trophy center
            drawTrophy(t);

            requestAnimationFrame(draw);
        }

        resize();
        window.addEventListener('resize', resize);
        draw();
    })();
    </script>
</body>
</html>
