        body {

        }

        .shimmer-text {

        .circle-logo { width: 70%; height: auto; }

        .card { 
            background: rgba(255, 255, 255, 0.03);

        .stamp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }

        .slot {

            border-radius: 50%; display: flex; align-items: center; justify-content: center;

        #success-overlay {

        body::-webkit-scrollbar { display: none; }

    <script>
        const firebaseConfig = { 
            databaseURL: "https://lem-moda-loyalty-default-rtdb.firebaseio.com/",
            appId: "1:901791881107:web:e1ff85e3fc768064eeba66"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let nombreClienteActivo = "Cliente VIP";

        document.querySelectorAll('#userName, #userPhone, #userPin').forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    accessSystem();
                }
            });
        });

        function toggleModal(show) {
            document.getElementById('modalBeneficios').style.display = show ? 'flex' : 'none';
        }

        function accessSystem() {
    const name = document.getElementById('userName').value.trim();
    const phone = document.getElementById('userPhone').value.trim();
    const pin = document.getElementById('userPin').value.trim();

    // 1. Validación visible para el usuario
    if(!phone || !pin) {
        alert("Por favor, ingresa tu número de WhatsApp y tu PIN de 4 dígitos.");
        return;
    }

    // 2. Feedback visual (cambiamos el texto del botón)
    const btn = document.querySelector('button[onclick="accessSystem()"]');
    const textOriginal = btn.innerText;
    btn.innerText = "Preparando tu acceso VIP...";
    btn.disabled = true;

    const userRef = db.ref('lem_users/' + phone);
    const timestampActual = new Date().toISOString();

    // 3. Consulta a Firebase con captura de errores (.catch)
    userRef.once('value', (snap) => {
        const data = snap.val();

        if(!data) {
            // SI ES NUEVO
            if(!name) {
                alert("¡Bienvenido a LEM MODA! Al ser tu primera vez, por favor escribe tu Nombre Completo en el primer recuadro.");
                btn.innerText = textOriginal;
                btn.disabled = false;
                return;
            }
            nombreClienteActivo = name;

            // ---> AQUÍ SE CREA LA CARPETA POR FECHA <---
            const fechaHoy = timestampActual.split('T')[0];

            userRef.set({
                nombre: name,
                pin: pin, 
                puntos: 0, 
                fecha_registro: timestampActual, 
                ultima_actividad: timestampActual
            }).then(() => {
                // Guardamos la copia en la carpeta diaria
                db.ref('registros_diarios/' + fechaHoy + '/' + phone).set({
                    nombre: name,
                    hora_ingreso: timestampActual
                });
                login(phone);
            }).catch(err => {
                alert("Error al guardar: " + err.message);
                btn.innerText = textOriginal;
                btn.disabled = false;
            });

        } else if(data.pin === pin) {
            // SI YA EXISTÍA
            if(!data.nombre) {
                if(!name) {
                    alert("Para actualizar tu perfil, por favor escribe tu Nombre Completo en el primer recuadro.");
                    btn.innerText = textOriginal;
                    btn.disabled = false;
                    return;
                }
                nombreClienteActivo = name;
                userRef.update({ nombre: name, ultima_actividad: timestampActual })
                    .then(() => login(phone));
            } else {
                nombreClienteActivo = data.nombre;
                userRef.update({ ultima_actividad: timestampActual })
                    .then(() => login(phone));
            }
        } else {
            alert("El PIN ingresado es incorrecto. Inténtalo de nuevo.");
            btn.innerText = textOriginal;
            btn.disabled = false;
        }
    }).catch((error) => {
        console.error("Error de Firebase:", error);
        alert("Error de conexión con la base de datos. Revisa la consola (F12).");
        btn.innerText = textOriginal;
        btn.disabled = false;
    });
}
        function login(phone) {
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('cardPanel').style.display = 'block';
            QRCode.toCanvas(document.getElementById('qr-canvas'), phone, { width: 120, margin: 1 });
            db.ref('lem_users/' + phone + '/puntos').on('value', (snap) => {
                const p = snap.val() || 0;
                document.getElementById('counterLabel').innerText = `${p} DE 8 SELLOS`;
                const grid = document.getElementById('stampGrid');
                grid.innerHTML = '';

                for(let i=0; i<8; i++) {
                    const s = document.createElement('div');
                    const isActive = i < p;
                    const index = i + 1;

                    s.className = 'slot' + (isActive ? ' active' : '');
                    s.setAttribute('data-index', index);

                    if(index === 4) s.classList.add('silver-frame');
                    if(index === 8) s.classList.add('gold-frame');

                    if(isActive) {
                        s.innerHTML = '<img src="2.png.png">';
                    } else {
                        if(index === 4) s.innerHTML = '<span class="premio-text silver">50% OFF<br>PRENDA</span>';
                        else if (index === 8) s.innerHTML = '<span class="premio-text gold">PRENDA<br>REGALO</span>';
                        else s.innerHTML = '';
                    }
                    grid.appendChild(s);
                }
                checkMilestones(p, phone);
            });
        }

        function checkMilestones(p, phone) {
            const overlay = document.getElementById('success-overlay');
            const title = document.getElementById('successTitle');
            const msg = document.getElementById('successMsg');
            const waAction = document.getElementById('waAction');
            const notifBox = document.getElementById('premioNotif');

            if (p === 4) {
                lanzarConfeti();
                overlay.style.display = 'flex';
                title.innerText = "¡Recompensa Alcanzada!";
                msg.innerText = `¡Felicidades ${nombreClienteActivo}! Por tus 4 estampas tienes el 50% de descuento en una prenda.`;
                waAction.innerHTML = `<button class="btn-main" style="background:#25d366; color:white; border-radius:50px;" onclick="enviarWA('${phone}', 4)">Reclamar por WhatsApp</button>`;
                notifBox.style.display = 'block';
                notifBox.innerHTML = `<small style="color:var(--lem-verde)">✓ Tienes un 50% OFF disponible</small>`;
            } else if (p >= 8) {
                lanzarConfeti();
                overlay.style.display = 'flex';
                title.innerText = "¡Nivel Completado!";
                msg.innerText = `¡Increíble ${nombreClienteActivo}! Has completado las 8 estampas. ¡Tu prenda de regalo te espera!`;
                waAction.innerHTML = `<button class="btn-main" style="background:#25d366; color:white; border-radius:50px;" onclick="enviarWA('${phone}', 8)">Reclamar Regalo</button>`;
                notifBox.style.display = 'block';
                notifBox.innerHTML = `<small style="color:var(--lem-verde)">✓ ¡Prenda de regalo lista!</small>`;
            } else {
                notifBox.style.display = 'none';
            }
        }

        function lanzarConfeti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#c9a84c', '#6DAE5A', '#ffffff', '#e8c87a'] });
        }

        function enviarWA(phone, hito) {
            const waNumber = "593984909967";
            let texto = "";

            if (hito === 4) {
                texto = `⭐ *¡BENEFICIO ELITE - LEM MODA!* ⭐\n\n` +
                        `Hola, equipo de LEM. 👋\n\n` +
                        `He completado mis primeras *4 ESTAMPAS* en mi Tarjeta Elite y quiero reclamar mi beneficio:\n` +
                        `🎁 *50% DE DESCUENTO* en una prenda de mi elección.\n\n` +
                        `📌 *Cliente:* ${nombreClienteActivo}\n` +
                        `📌 *WhatsApp registrado:* ${phone}\n\n` +
                        `¿Me ayudan para hacerlo efectivo? ¡Muchas gracias! 🙌`;
            } else {
                texto = `🏆 *¡TARJETA ELITE COMPLETA - LEM MODA!* 🏆\n\n` +
                        `¡Hola equipo LEM! 👋\n\n` +
                        `He completado mis *8 ESTAMPAS* en la Tarjeta Elite.\n` +
                        `🛍️ ¡Vengo por mi *PRENDA DE REGALO*!\n\n` +
                        `📌 *Cliente:* ${nombreClienteActivo}\n` +
                        `📌 *WhatsApp registrado:* ${phone}\n\n` +
                        `Quedo atento/a para coordinar. ¡Gracias! ✨`;
            }
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>

    <script>
        (function() {
            const canvas = document.getElementById('lemCanvas');
            const ctx = canvas.getContext('2d');
            let W, H, t = 0;

            // ── Partículas de puntos dorados ──────────────────────────────
            const DOTS = Array.from({length: 80}, () => ({
                x: Math.random(),
                y: Math.random(),
                r: 0.5 + Math.random() * 1.8,
                phase: Math.random() * Math.PI * 2,
                speed: 0.008 + Math.random() * 0.018,
                vy: -(0.00008 + Math.random() * 0.00015),
                vx: (Math.random() - 0.5) * 0.00006
            }));

            // ── Líneas de conexión sutiles ────────────────────────────────
            const NODES = Array.from({length: 18}, () => ({
                x: Math.random(),
                y: Math.random(),
                vx: (Math.random() - 0.5) * 0.0003,
                vy: (Math.random() - 0.5) * 0.0003,
            }));

            // ── Palabras de marca flotantes ───────────────────────────────
            const BRAND_WORDS = [
                'LEM MODA', 'ELITE', 'ATHLEISURE',
                'QUITO', 'ESTILO', 'URBAN',
                'LEM MODA', 'PREMIUM', 'COLECCIÓN',
                'LEM', 'MODA', 'ELITE'
            ];

            const GOLD_FILLS = ['#c9a84c', '#e8c87a', '#f0d080', '#b8965a'];
            const GREEN_FILLS = ['#6DAE5A', '#5a9e4a', '#7dc46a'];

            let words = [];
            let fontReady = false;
            document.fonts.ready.then(() => { fontReady = true; });

            function resize() {
                W = canvas.width  = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            function createWord() {
                const side = Math.floor(Math.random() * 4);
                let x, y, vx, vy;
                const speed = 0.15 + Math.random() * 0.2;
                if (side === 0)      { x = Math.random() * W; y = -20;   vx = (Math.random()-0.5)*0.15; vy = speed; }
                else if (side === 1) { x = W+20;  y = Math.random()*H;   vx = -speed; vy = (Math.random()-0.5)*0.15; }
                else if (side === 2) { x = Math.random()*W; y = H+20;    vx = (Math.random()-0.5)*0.15; vy = -speed; }
                else                 { x = -20;   y = Math.random()*H;   vx = speed;  vy = (Math.random()-0.5)*0.15; }

                const isGold = Math.random() > 0.3;
                return {
                    x, y, vx, vy,
                    text: rand(BRAND_WORDS),
                    fill: isGold ? rand(GOLD_FILLS) : rand(GREEN_FILLS),
                    size: 9 + Math.floor(Math.random() * 8),
                    alpha: 0,
                    life: 0,
                    maxLife: 350 + Math.floor(Math.random() * 250),
                    angle: (Math.random() - 0.5) * 0.15
                };
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                t += 0.012;

                // Dots parpadeantes
                for (const d of DOTS) {
                    d.x += d.vx; d.y += d.vy;
                    d.phase += d.speed;
                    if (d.y < -0.02) d.y = 1.02;
                    if (d.x < -0.01 || d.x > 1.01) d.vx *= -1;
                    const alpha = 0.08 + Math.abs(Math.sin(d.phase)) * 0.18;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#c9a84c';
                    ctx.beginPath();
                    ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Nodos conectados con líneas
                for (const n of NODES) {
                    n.x += n.vx; n.y += n.vy;
                    if (n.x < 0 || n.x > 1) n.vx *= -1;
                    if (n.y < 0 || n.y > 1) n.vy *= -1;
                }
                for (let i = 0; i < NODES.length; i++) {
                    for (let j = i + 1; j < NODES.length; j++) {
                        const dx = (NODES[i].x - NODES[j].x) * W;
                        const dy = (NODES[i].y - NODES[j].y) * H;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 180) {
                            ctx.globalAlpha = (1 - dist/180) * 0.06;
                            ctx.strokeStyle = '#c9a84c';
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(NODES[i].x * W, NODES[i].y * H);
                            ctx.lineTo(NODES[j].x * W, NODES[j].y * H);
                            ctx.stroke();
                        }
                    }
                }

                // Palabras de marca flotantes
                if (fontReady && words.length < 8 && Math.random() < 0.025) {
                    words.push(createWord());
                }

                words = words.filter(w => {
                    w.life++;
                    w.x += w.vx; w.y += w.vy;
                    const fz = 60;
                    if (w.life < fz) w.alpha = w.life / fz;
                    else if (w.life > w.maxLife - fz) w.alpha = Math.max(0, (w.maxLife - w.life) / fz);
                    else w.alpha = 1;
                    if (w.life >= w.maxLife) return false;
                    if (w.x < -150 || w.x > W+150 || w.y < -40 || w.y > H+40) return false;

                    ctx.save();
                    ctx.globalAlpha = w.alpha * 0.55;
                    ctx.translate(w.x, w.y);
                    ctx.rotate(w.angle);
                    ctx.font = `700 ${w.size}px 'Inter', sans-serif`;
                    ctx.letterSpacing = '3px';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = w.fill;
                    ctx.fillText(w.text, 0, 0);
                    ctx.restore();
                    return true;
                });

                requestAnimationFrame(draw);
            }

            resize();
            window.addEventListener('resize', resize);

            // Sembrar palabras iniciales
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    const w = createWord();
                    w.x = 30 + Math.random() * (W - 60);
                    w.y = 30 + Math.random() * (H - 60);
                    w.life = Math.floor(Math.random() * 150);
                    words.push(w);
                }
                draw();
            }, 300);
        })();
    </script>
</body>
</html>
