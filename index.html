<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEM MODA | Tarjeta VIP</title>

    <meta name="description" content="Programa de Lealtad Elite de LEM MODA. Colecciona estampas y obtén beneficios exclusivos.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lemmoda.vercel.app/"> 
    <meta property="og:title" content="LEM MODA | Elite">
    <meta property="og:description" content="¡Colecciona tus estampas y canjea premios exclusivos en LEM MODA!">
    <meta property="og:image" content="https://lemmoda.vercel.app/logo-lem-elite.png"> 
    <meta property="og:image:secure_url" content="https://lemmoda.vercel.app/logo-lem-elite.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LEM MODA | Elite">
    <meta name="twitter:description" content="¡Colecciona tus estampas y canjea premios exclusivos en LEM MODA!">
    <meta name="twitter:image" content="https://lemmoda.vercel.app/logo-lem-elite.png">

    <link rel="icon" type="image/png" href="logo-lem-elite.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#784311">

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --lem-cafe: #784311; 
            --lem-gold: #d4a373; 
            --lem-verde: #38b000;
            --silver-fine: #bdc3c7;
            --gold-fine: #d4af37;
        }

        body { 
            background: radial-gradient(circle, #2a1806 0%, #000000 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            /* CAMBIO CLAVE: Permitir scroll si el contenido es muy alto */
            overflow-y: auto; 
        }

        /* Ajuste para que en PC no se pegue al techo */
        .container { 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            position: relative; 
            z-index: 10; 
            padding: 40px 0; /* Margen arriba y abajo */
        }
        
        .brand-circle {
            width: 120px; height: 120px;
            background: #fff; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px; border: 2px solid var(--lem-gold); 
            box-shadow: 0 0 20px rgba(212, 163, 115, 0.2); 
        }
        
        .circle-logo { width: 70%; height: auto; }
        
        .card { 
            background: rgba(20, 15, 10, 0.6); 
            border: 1px solid rgba(212, 163, 115, 0.2); 
            border-radius: 35px; padding: 25px; 
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
        }

        .card-logo-box { background: #fff; border-radius: 12px; padding: 8px; display: inline-block; margin-bottom: 20px; }
        .card-logo { width: 110px; }
        
        .stamp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        
        .slot { 
            aspect-ratio: 1; background: rgba(0,0,0,0.8); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(212, 163, 115, 0.1); position: relative;
            flex-direction: column; text-align: center; overflow: hidden;
        }

        .slot.active { background: #fff; border: 2px solid var(--lem-verde); }
        .slot img { width: 60%; display: none; }
        .slot.active img { display: block; filter: none; width: 65%; }

        .slot::before { content: attr(data-index); color: #444; font-weight: bold; position: absolute; font-size: 0.7rem; }
        .slot.active::before { display: none; }

        .silver-frame { border: 1.5px solid var(--silver-fine) !important; }
        .gold-frame { border: 1.5px solid var(--gold-fine) !important; }
        .premio-text { font-size: 0.55rem; line-height: 1.1; font-weight: bold; padding: 2px; text-transform: uppercase; }
        .premio-text.silver { color: #bdc3c7; }
        .premio-text.gold { color: #d4af37; }

        .input-box { 
            background: #000; border: 1px solid rgba(212, 163, 115, 0.2); 
            color: #fff; padding: 16px; border-radius: 15px; width: 100%; 
            margin-bottom: 12px; box-sizing: border-box; text-align: center; outline: none;
        }

        .btn-main { 
            background: linear-gradient(135deg, #d4a373 0%, #b08968 100%); 
            color: #000; border: none; padding: 16px; border-radius: 15px; 
            width: 100%; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer;
        }

        .btn-beneficios {
            background: transparent; color: var(--lem-gold); border: 1px solid var(--lem-gold);
            padding: 10px 20px; border-radius: 20px; margin-bottom: 15px;
            cursor: pointer; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase;
        }

        .btn-web-store {
            background: rgba(212, 163, 115, 0.05);
            border: 1px solid rgba(212, 163, 115, 0.3);
            color: var(--lem-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-web-store:hover {
            background: rgba(212, 163, 115, 0.15);
            border-color: var(--lem-gold);
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center;
        }

        .modal-content {
            background: #0a0a0a; border: 1px solid var(--lem-gold); padding: 30px;
            border-radius: 25px; width: 85%; max-width: 350px; text-align: center;
        }

        .premio-box {
            background: rgba(56, 176, 0, 0.1); border: 1px dashed var(--lem-verde);
            border-radius: 15px; padding: 15px; margin-top: 15px; display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #success-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; 
        }

        .success-card { 
            background: #000; border: 1px solid var(--lem-gold); 
            border-radius: 35px; padding: 30px; width: 80%; text-align: center; 
        }

        /* Ocultar scrollbar pero mantener funcionalidad */
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="modalBeneficios" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--lem-gold); letter-spacing: 2px;">BENEFICIOS LEM</h3>
            <ul style="text-align: left; font-size: 0.85rem; line-height: 1.8; color: #ccc;">
                <li>• <strong>4 ESTAMPAS:</strong> 50% de descuento en una prenda de tu compra actual.</li>
                <li>• <strong>8 ESTAMPAS:</strong> 1 Prenda seleccionada de regalo.</li>
            </ul>
            <button class="btn-main" style="padding: 10px; margin-top: 20px;" onclick="toggleModal(false)">Cerrar</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="success-card">
            <div class="card-logo-box"><img src="1.png.png" style="width: 100px;"></div>
            <h2 id="successTitle" style="color: var(--lem-gold); font-weight: 300; letter-spacing: 2px;">¡Felicidades!</h2>
            <p id="successMsg" style="font-size: 0.85rem; color: #aaa; line-height: 1.5;"></p>
            <div id="waAction"></div>
            <button class="btn-main" style="margin-top: 15px; background: transparent; color: #555; border: 1px solid #222;" onclick="document.getElementById('success-overlay').style.display='none'">Volver</button>
        </div>
    </div>

    <div class="container">
        <div id="authPanel">
            <div class="brand-circle"><img src="1.png.png" class="circle-logo"></div>
            <h3 style="letter-spacing: 5px; color: var(--lem-gold); font-weight: 300;">BIENVENIDO</h3>
            <input type="tel" id="userPhone" class="input-box" placeholder="WhatsApp">
            <input type="password" id="userPin" class="input-box" placeholder="PIN de 4 dígitos" maxlength="4">
            <button class="btn-main" onclick="accessSystem()">Ingresar</button>
        </div>

        <div id="cardPanel" style="display:none">
            <button class="btn-beneficios" onclick="toggleModal(true)">Ver Beneficios</button>
            <div class="card">
                <div class="card-logo-box"><img src="1.png.png" class="card-logo"></div>
                <div class="stamp-grid" id="stampGrid"></div>
                <p id="counterLabel" style="color: var(--lem-gold); font-size: 0.75rem; letter-spacing: 1px;">Sincronizando...</p>
                
                <div id="premioNotif" class="premio-box"></div>

                <div style="background:#fff; padding:8px; border-radius:12px; display:inline-block; margin-top: 10px;">
                    <canvas id="qr-canvas"></canvas>
                </div>
            </div>

            <a href="(AQUI PONER LINK)" target="_blank" class="btn-web-store">
                <i class="fa-solid fa-bag-shopping"></i> Ir a la Tienda Online
            </a>

            <button class="btn-main" style="margin-top:20px; background:transparent; color:#555; border:1px solid #222;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
        <p style="font-size: 10px; color: #444; margin-top: 20px;">ORCA Studios &copy; 2026</p>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://lem-moda-loyalty-default-rtdb.firebaseio.com/",
            appId: "1:901791881107:web:e1ff85e3fc768064eeba66"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleModal(show) {
            document.getElementById('modalBeneficios').style.display = show ? 'flex' : 'none';
        }

        function accessSystem() {
            const phone = document.getElementById('userPhone').value.trim();
            const pin = document.getElementById('userPin').value.trim();
            if(!phone || !pin) return;
            const userRef = db.ref('lem_users/' + phone);
            userRef.once('value', (snap) => {
                const data = snap.val();
                if(!data) userRef.set({pin, puntos: 0}).then(() => login(phone));
                else if(data.pin === pin) login(phone);
                else alert("PIN incorrecto");
            });
        }

        function login(phone) {
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('cardPanel').style.display = 'block';
            QRCode.toCanvas(document.getElementById('qr-canvas'), phone, { width: 120, margin: 1 });
            
            db.ref('lem_users/' + phone + '/puntos').on('value', (snap) => {
                const p = snap.val() || 0;
                document.getElementById('counterLabel').innerText = `${p} DE 8 SELLOS`;
                const grid = document.getElementById('stampGrid');
                grid.innerHTML = '';
                
                for(let i=0; i<8; i++) {
                    const s = document.createElement('div');
                    const isActive = i < p;
                    const index = i + 1;
                    s.className = 'slot' + (isActive ? ' active' : '');
                    s.setAttribute('data-index', index);

                    if(index === 4) s.classList.add('silver-frame');
                    if(index === 8) s.classList.add('gold-frame');

                    if(isActive) {
                        s.innerHTML = '<img src="2.png.png">';
                    } else {
                        if(index === 4) s.innerHTML = '<span class="premio-text silver">50% OFF<br>PRENDA</span>';
                        else if (index === 8) s.innerHTML = '<span class="premio-text gold">PRENDA<br>REGALO</span>';
                        else s.innerHTML = ''; 
                    }
                    grid.appendChild(s);
                }
                checkMilestones(p, phone);
            });
        }

        function checkMilestones(p, phone) {
            const overlay = document.getElementById('success-overlay');
            const title = document.getElementById('successTitle');
            const msg = document.getElementById('successMsg');
            const waAction = document.getElementById('waAction');
            const notifBox = document.getElementById('premioNotif');

            if (p === 4) {
                lanzarConfeti();
                overlay.style.display = 'flex';
                title.innerText = "¡Recompensa Alcanzada!";
                msg.innerText = "¡Felicidades! Por tus 4 estampas tienes el 50% de descuento en una prenda.";
                waAction.innerHTML = `<button class="btn-main" style="background:#25d366; color:white;" onclick="enviarWA('${phone}', 4)">Reclamar por WhatsApp</button>`;
                notifBox.style.display = 'block';
                notifBox.innerHTML = `<small style="color:var(--lem-verde)">✓ Tienes un 50% OFF disponible</small>`;
            } else if (p >= 8) {
                lanzarConfeti();
                overlay.style.display = 'flex';
                title.innerText = "¡Nivel Completado!";
                msg.innerText = "¡Increíble! Has completado las 8 estampas. ¡Tu prenda de regalo te espera!";
                waAction.innerHTML = `<button class="btn-main" style="background:#25d366; color:white;" onclick="enviarWA('${phone}', 8)">Reclamar Regalo</button>`;
                notifBox.style.display = 'block';
                notifBox.innerHTML = `<small style="color:var(--lem-verde)">✓ ¡Prenda de regalo lista!</small>`;
            } else {
                notifBox.style.display = 'none';
            }
        }

        function lanzarConfeti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d4a373', '#784311', '#ffffff'] });
        }

        function enviarWA(phone, hito) {
            const waNumber = "593984909967"; 
            let texto = "";
            
            if (hito === 4) {
                texto = `✨ *¡TENGO UNA RECOMPENSA EN LEM MODA!* ✨\n\n` +
                        `Hola, equipo de LEM. 👋\n\n` +
                        `¡Qué buena noticia! Ya completé mis primeras *4 ESTAMPAS* 🎫 y quiero solicitar mi beneficio:\n` +
                        `🎁 *50% DE DESCUENTO* en mi prenda.\n\n` +
                        `📌 *Mi número registrado:* ${phone}\n\n` +
                        `¿Me ayudan para hacerlo efectivo en mi compra? ¡Muchas gracias! 🥂`;
            } else {
                texto = `👑 *¡OBJETIVO LOGRADO EN LEM MODA!* 👑\n\n` +
                        `¡Hola! 👋 ¡Lo logré!\n\n` +
                        `He completado mis *8 ESTAMPAS* 🏆 y ya tengo mi tarjeta llena.\n` +
                        `🛍️ ¡Vengo por mi *PRENDA DE REGALO*!\n\n` +
                        `📌 *Mi número registrado:* ${phone}\n\n` +
                        `Estoy muy emocionado/a por elegir mi regalo. ¡Gracias! ✨`;
            }
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>
</body>
</html>
