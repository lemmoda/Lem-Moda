<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEM Admin | Día del Padre 2026</title>
    
    <link rel="manifest" href="manifest-admin.json?v=2">
    <meta name="theme-color" content="#1a2e4a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="LEM Admin">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --lem-gold: #c9a84c; 
            --lem-verde: #38b000; 
            --silver-admin: #7a9fc2;
            --gold-admin: #c9a84c;
            --navy: #1a2e4a;
            --navy-light: #243d5e;
        }
        * { box-sizing: border-box; }
        body { 
            background: radial-gradient(ellipse at top, #0e1f38 0%, #030a16 100%); 
            color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; 
            text-align: center; min-height: 100vh; overflow-x: hidden;
        }
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }

        .page-wrap { position: relative; z-index: 10; }

        .header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(201, 168, 76, 0.25); }
        .admin-crest {
            width: 56px; height: 56px; margin: 0 auto 12px; border-radius: 50%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--lem-gold); box-shadow: 0 0 20px rgba(201, 168, 76, 0.25);
        }
        .admin-crest img { width: 68%; height: auto; }

        #reader-container { position: relative; }
        #reader { 
            width: 100%; max-width: 400px; margin: 0 auto; 
            border: 1px solid rgba(201, 168, 76, 0.4); border-radius: 25px; overflow: hidden; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.85); 
        }
        
        .admin-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(201, 168, 76, 0.3); 
            border-radius: 30px; padding: 28px; margin-top: 20px; display: none; 
            backdrop-filter: blur(20px); box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }
        .admin-card h2#clientName { letter-spacing: 0.5px; }
        .admin-card h3#clientPhone { letter-spacing: 1px; font-size: 0.9rem; }

        .btn-action { 
            background: linear-gradient(135deg, #d4a373 0%, #b08968 100%); 
            color: #000; border: none; padding: 18px 25px; border-radius: 15px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 8px; width: 45%; 
            cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-action:active { transform: scale(0.97); }
        .btn-action[style*="1a2e4a"] { 
            background: rgba(255,255,255,0.06) !important; 
            border: 1px solid rgba(201, 168, 76, 0.3) !important; 
            color: #fff !important;
        }

        .btn-scan-again { 
            background: transparent; color: var(--lem-gold); border: 1px solid rgba(201, 168, 76, 0.5); 
            margin-top: 20px; width: 100%; padding: 15px; border-radius: 15px; 
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; 
            transition: 0.25s;
        }
        .btn-scan-again:hover { background: rgba(201, 168, 76, 0.1); }

        .status-msg { color: var(--lem-verde); font-weight: bold; margin-top: 15px; letter-spacing: 0.5px; }

        #currentPoints { text-shadow: 0 0 25px rgba(255,255,255,0.15); }

        .reward-alert { 
            padding: 16px; border-radius: 15px; margin: 15px 0; display: none;
            border-width: 1.5px; border-style: solid; letter-spacing: 0.5px;
            animation: pulse-soft 2s infinite; backdrop-filter: blur(10px);
        }

        .alert-silver { 
            background: rgba(189, 195, 199, 0.08); border-color: var(--silver-admin); color: var(--silver-admin);
            box-shadow: 0 0 25px rgba(122, 159, 194, 0.15);
        }

        .alert-gold { 
            background: rgba(212, 175, 55, 0.08); border-color: var(--gold-admin); color: var(--gold-admin);
            box-shadow: 0 0 25px rgba(201, 168, 76, 0.2);
        }

        @keyframes pulse-soft {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); opacity: 0.85; }
            100% { transform: scale(1); }
        }

        .btn-reset { 
            background: rgba(102, 0, 0, 0.5); border: 1px solid rgba(255,80,80,0.35); color: #fff; 
            padding: 10px; border-radius: 10px; font-size: 0.7rem; letter-spacing: 0.5px;
            margin-top: 10px; width: 100%; cursor: pointer; transition: 0.25s;
        }
        .btn-reset:hover { background: rgba(102, 0, 0, 0.75); }
    </style>
</head>
<body>
    <canvas id="lemCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0.6;"></canvas>

    <div class="page-wrap">
    <div class="header">
        <div class="admin-crest"><img src="1.png.png" alt="LEM"></div>
        <h2 style="color: var(--lem-gold); letter-spacing: 3px; margin: 0;">LEM MODA</h2>
        <p style="font-size: 0.75rem; color: var(--lem-gold); margin: 4px 0; letter-spacing: 2px; opacity: 0.8;">👔 EDICIÓN DÍA DEL PADRE 2026</p>
        <p style="font-size: 0.6rem; color: #3a5a8a; margin: 2px 0; letter-spacing: 1px;">PANEL DE CONTROL · ACCESO ELITE</p>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
    </div>

    <div id="adminPanel" class="admin-card">
        <h2 id="clientName" style="color: #fff; margin: 0 0 5px 0; font-weight: 700; font-size: 1.4rem;">Cargando...</h2>
        <h3 id="clientPhone" style="color: var(--lem-gold); font-weight: 300; margin-top: 0;">WhatsApp: ---</h3>
        
        <p style="margin: 5px 0; font-size: 0.8rem; color: #666;">Puntos Actuales:</p>
        <span id="currentPoints" style="font-size: 3rem; color: #fff; font-weight: bold;">0</span>
        
        <div id="adminRewardAlert" class="reward-alert">
            <span id="rewardText" style="font-size: 1rem; font-weight: bold; letter-spacing: 1px;"></span>
        </div>

        <div style="display: flex; justify-content: center; margin-top: 20px;">
            <button class="btn-action" onclick="adjustPoints(1)">+ SELLO</button>
            <button class="btn-action" style="background: #1a2e4a; color: #fff;" onclick="adjustPoints(-1)">- QUITAR</button>
        </div>

        <button id="resetBtn" class="btn-reset" style="display:none;" onclick="resetCard()">REINICIAR TARJETA (PREMIO ENTREGADO)</button>

        <p id="logMsg" class="status-msg"></p>
        <button class="btn-scan-again" onclick="restartScanner()">VOLVER A ESCANEAR</button>
    </div>
    <p style="font-size: 10px; color: #444; margin-top: 20px;">ORCA Studios &copy; 2026</p>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://lem-moda-loyalty-default-rtdb.firebaseio.com/",
            appId: "1:901791881107:web:e1ff85e3fc768064eeba66"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode;
        let nombreClienteMemoria = "Cliente VIP";
        let telefonoOriginalEscaneado = ""; // Volvemos al método directo del admin antiguo

        function actualizarRegistroDelDia(phone, puntosFinales) {
            const ahora = new Date();
            const carpetaFecha = ahora.getFullYear() + "-" + 
                                String(ahora.getMonth() + 1).padStart(2, '0') + "-" + 
                                String(ahora.getDate()).padStart(2, '0');
            
            document.getElementById('logMsg').innerText = "Guardando reporte...";
            document.getElementById('logMsg').style.color = "#d4a373";

            // Se guarda con la ruta e ID exactos del formato antiguo
            db.ref('reporte_diario/' + carpetaFecha + '/' + phone).set({
                nombre: nombreClienteMemoria,
                whatsapp: phone,
                puntos_al_cierre: puntosFinales,
                hora_ultima_accion: ahora.toLocaleTimeString()
            }).then(() => {
                document.getElementById('logMsg').innerText = "¡Reporte guardado con éxito!";
                document.getElementById('logMsg').style.color = "var(--lem-verde)";
            }).catch((err) => {
                alert("ERROR EN REPORTE: " + err.message);
            });
        }

        async function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 250, height: 250 } };
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader-container').style.display = 'none';
                        document.getElementById('adminPanel').style.display = 'block';
                        loadUserData(decodedText);
                    });
                });
            } catch (err) { console.error("Error de cámara: ", err); }
        }

        function loadUserData(phone) {
            // Regresamos al mapeo 1:1 del archivo original para mantener compatibilidad
            telefonoOriginalEscaneado = phone;

            db.ref('lem_users/' + phone).on('value', (snap) => {
                const data = snap.val();
                const puntos = data ? (data.puntos || 0) : 0;
                nombreClienteMemoria = data && data.nombre ? data.nombre : "Cliente VIP";
                
                document.getElementById('clientName').innerText = nombreClienteMemoria;
                document.getElementById('clientPhone').innerText = "WhatsApp: " + phone;
                document.getElementById('currentPoints').innerText = puntos;
                updateAdminAlerts(puntos);
            });
        }

        function updateAdminAlerts(puntos) {
            const alertBox = document.getElementById('adminRewardAlert');
            const alertText = document.getElementById('rewardText');
            const resetBtn = document.getElementById('resetBtn');

            alertBox.classList.remove('alert-silver', 'alert-gold');

            if (puntos === 4) {
                alertBox.style.display = 'block';
                alertBox.classList.add('alert-silver');
                alertText.innerHTML = "👔 BENEFICIO PAPÁ:<br>50% DESCUENTO";
                resetBtn.style.display = 'none';
            } else if (puntos >= 8) {
                alertBox.style.display = 'block';
                alertBox.classList.add('alert-gold');
                alertText.innerHTML = "👨‍👦 BENEFICIO ESPECIAL:<br>PRENDA DE REGALO";
                resetBtn.style.display = 'block'; 
            } else {
                alertBox.style.display = 'none';
                resetBtn.style.display = 'none';
            }
        }

        function adjustPoints(change) {
            if (!telefonoOriginalEscaneado) {
                alert("Error: No hay teléfono detectado.");
                return;
            }

            const ref = db.ref('lem_users/' + telefonoOriginalEscaneado + '/puntos');
            ref.transaction((c) => {
                let newVal = (c || 0) + change;
                return (newVal < 0) ? 0 : (newVal > 8 ? 8 : newVal);
            }, (error, committed, snapshot) => {
                if (committed) {
                    actualizarRegistroDelDia(telefonoOriginalEscaneado, snapshot.val());
                }
            });
        }

        function resetCard() {
            if(confirm("¿Confirmas que ya entregaste el premio y quieres reiniciar los puntos a 0?")) {
                if (!telefonoOriginalEscaneado) return;
                db.ref('lem_users/' + telefonoOriginalEscaneado + '/puntos').set(0);
                actualizarRegistroDelDia(telefonoOriginalEscaneado, 0);
            }
        }

        function restartScanner() {
            if(telefonoOriginalEscaneado) {
                db.ref('lem_users/' + telefonoOriginalEscaneado).off(); 
            }
            
            telefonoOriginalEscaneado = "";
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('reader-container').style.display = 'block';
            
            document.getElementById('clientName').innerText = "Cargando...";
            document.getElementById('clientPhone').innerText = "WhatsApp: ---";
            document.getElementById('logMsg').innerText = "";
            
            startScanner();
        }

        window.onload = startScanner;
    </script>

    <script>
        (function() {
            const canvas = document.getElementById('lemCanvas');
            const ctx = canvas.getContext('2d');
            let W, H, t = 0;

            const DOTS = Array.from({length: 60}, () => ({
                x: Math.random(),
                y: Math.random(),
                r: 0.5 + Math.random() * 1.8,
                phase: Math.random() * Math.PI * 2,
                speed: 0.008 + Math.random() * 0.018,
                vy: -(0.00008 + Math.random() * 0.00015),
                vx: (Math.random() - 0.5) * 0.00006
            }));

            const NODES = Array.from({length: 14}, () => ({
                x: Math.random(),
                y: Math.random(),
                vx: (Math.random() - 0.5) * 0.0003,
                vy: (Math.random() - 0.5) * 0.0003,
            }));

            const BRAND_WORDS = [
                'LEM MODA', 'ADMIN', 'ELITE',
                'CONTROL', 'PANEL', 'STAFF',
                'LEM MODA', 'PREMIUM', 'QUITO'
            ];

            const GOLD_FILLS = ['#c9a84c', '#e8c87a', '#f0d080', '#b8965a'];
            const BLUE_FILLS = ['#7a9fc2', '#5b85ad', '#a5c2de'];

            let words = [];
            let fontReady = false;
            document.fonts.ready.then(() => { fontReady = true; });

            function resize() {
                W = canvas.width  = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            function createWord() {
                const side = Math.floor(Math.random() * 4);
                let x, y, vx, vy;
                const speed = 0.15 + Math.random() * 0.2;
                if (side === 0)      { x = Math.random() * W; y = -20;   vx = (Math.random()-0.5)*0.15; vy = speed; }
                else if (side === 1) { x = W+20;  y = Math.random()*H;   vx = -speed; vy = (Math.random()-0.5)*0.15; }
                else if (side === 2) { x = Math.random()*W; y = H+20;    vx = (Math.random()-0.5)*0.15; vy = -speed; }
                else                 { x = -20;   y = Math.random()*H;   vx = speed;  vy = (Math.random()-0.5)*0.15; }

                const isGold = Math.random() > 0.35;
                return {
                    x, y, vx, vy,
                    text: rand(BRAND_WORDS),
                    fill: isGold ? rand(GOLD_FILLS) : rand(BLUE_FILLS),
                    size: 9 + Math.floor(Math.random() * 8),
                    alpha: 0,
                    life: 0,
                    maxLife: 350 + Math.floor(Math.random() * 250),
                    angle: (Math.random() - 0.5) * 0.15
                };
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                t += 0.012;

                for (const d of DOTS) {
                    d.x += d.vx; d.y += d.vy;
                    d.phase += d.speed;
                    if (d.y < -0.02) d.y = 1.02;
                    if (d.x < -0.01 || d.x > 1.01) d.vx *= -1;
                    const alpha = 0.08 + Math.abs(Math.sin(d.phase)) * 0.18;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#c9a84c';
                    ctx.beginPath();
                    ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2);
                    ctx.fill();
                }

                for (const n of NODES) {
                    n.x += n.vx; n.y += n.vy;
                    if (n.x < 0 || n.x > 1) n.vx *= -1;
                    if (n.y < 0 || n.y > 1) n.vy *= -1;
                }
                for (let i = 0; i < NODES.length; i++) {
                    for (let j = i + 1; j < NODES.length; j++) {
                        const dx = (NODES[i].x - NODES[j].x) * W;
                        const dy = (NODES[i].y - NODES[j].y) * H;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 180) {
                            ctx.globalAlpha = (1 - dist/180) * 0.06;
                            ctx.strokeStyle = '#c9a84c';
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(NODES[i].x * W, NODES[i].y * H);
                            ctx.lineTo(NODES[j].x * W, NODES[j].y * H);
                            ctx.stroke();
                        }
                    }
                }

                if (fontReady && words.length < 7 && Math.random() < 0.02) {
                    words.push(createWord());
                }

                words = words.filter(w => {
                    w.life++;
                    w.x += w.vx; w.y += w.vy;
                    const fz = 60;
                    if (w.life < fz) w.alpha = w.life / fz;
                    else if (w.life > w.maxLife - fz) w.alpha = Math.max(0, (w.maxLife - w.life) / fz);
                    else w.alpha = 1;
                    if (w.life >= w.maxLife) return false;
                    if (w.x < -150 || w.x > W+150 || w.y < -40 || w.y > H+40) return false;

                    ctx.save();
                    ctx.globalAlpha = w.alpha * 0.5;
                    ctx.translate(w.x, w.y);
                    ctx.rotate(w.angle);
                    ctx.font = `700 ${w.size}px 'Inter', sans-serif`;
                    ctx.letterSpacing = '3px';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = w.fill;
                    ctx.fillText(w.text, 0, 0);
                    ctx.restore();
                    return true;
                });

                requestAnimationFrame(draw);
            }

            resize();
            window.addEventListener('resize', resize);

            setTimeout(() => {
                for (let i = 0; i < 4; i++) {
                    const w = createWord();
                    w.x = 30 + Math.random() * (W - 60);
                    w.y = 30 + Math.random() * (H - 60);
                    w.life = Math.floor(Math.random() * 150);
                    words.push(w);
                }
                draw();
            }, 300);
        })();
    </script>
</body>
</html>
